name: CI

"on":
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # mobile is excluded from the workspace; this installs web, sfu, and the
        # shared packages (incl. meeting-core's vitest devDep).
        run: pnpm install --frozen-lockfile

      - name: Typecheck apps/web
        run: pnpm -C apps/web exec tsc --noEmit

      - name: Lint apps/web
        # Cherry-picked ESLint config: the react-hooks crash guard (error)
        # plus typed TypeScript bug-class rules. Error tier gates regressions;
        # warn tier is the documented burn-down list and does not fail CI.
        run: pnpm -C apps/web run lint

      - name: Lint packages
        # Same philosophy for the workspace packages (sfu, meeting-core,
        # apps-sdk, shared-browser, ui-tokens): async bug classes (floating/
        # misused promises) are errors — a dropped rejection in the SFU is a
        # prod crash class.
        run: pnpm run lint:packages

      - name: Structural conventions (konsistent)
        # Enforces repo-level shape: game modules export <id>Module, hooks are
        # named after their file, every package has a manifest, etc.
        run: pnpm run konsistent

      - name: Typecheck packages/sfu
        run: pnpm -C packages/sfu exec tsc --noEmit

      - name: Typecheck packages/meeting-core
        # meeting-core is source-consumed by web and sfu; its own tsconfig
        # keeps it honest standalone (and powers typed lint). It has no
        # typescript devDep, so borrow sfu's compiler.
        run: pnpm -C packages/sfu exec tsc -p ../meeting-core/tsconfig.json --noEmit

      - name: Unit tests (packages/sfu)
        run: pnpm -C packages/sfu test

      - name: Unit tests (packages/meeting-core)
        run: pnpm -C packages/meeting-core test

      - name: Verify generated Swift events are in sync
        # apps/conclave-skip/.../SfuEvents.swift is generated from
        # packages/meeting-core/src/sfu-events.ts (the cross-platform source of
        # truth). Regenerate and fail if it drifts — i.e. someone changed the TS
        # event list without re-running the generator (this is how stale
        # recording:* events once slipped through unnoticed).
        run: |
          node packages/meeting-core/scripts/gen-swift-events.mjs
          git diff --exit-code -- apps/conclave-skip/Sources/Conclave/Core/Networking/SfuEvents.swift
