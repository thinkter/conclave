services:
  sfu-a:
    build:
      context: .
      dockerfile: packages/sfu/Dockerfile
    network_mode: "host"
    environment:
      SFU_PORT: "3031"
      SFU_INSTANCE_ID: "sfu-a"
      SFU_SECRET: ${SFU_SECRET}
      TRANSCRIPT_WORKER_URL: ${TRANSCRIPT_WORKER_URL:-http://localhost:8788}
      SFU_DRAINING: "false"
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "41000"
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      PLAIN_TRANSPORT_ANNOUNCED_IP: ${PLAIN_TRANSPORT_ANNOUNCED_IP:-${ANNOUNCED_IP}}
      SFU_VERSION: "v1"
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_WORKERS_AI_MODEL: ${CLOUDFLARE_WORKERS_AI_MODEL:-}
      SFU_GAME_AI_ENABLED: ${SFU_GAME_AI_ENABLED:-}
      SFU_GAME_AI_TIMEOUT_MS: ${SFU_GAME_AI_TIMEOUT_MS:-}
      SFU_GAME_AI_WEB_SEARCH_ENABLED: ${SFU_GAME_AI_WEB_SEARCH_ENABLED:-}
      SFU_GAME_AI_WEB_SEARCH_CONTEXT_SIZE: ${SFU_GAME_AI_WEB_SEARCH_CONTEXT_SIZE:-}
      REDIS_URL: ${REDIS_URL:-}
      SFU_REDIS_URL: ${SFU_REDIS_URL:-${REDIS_URL:-}}
      SFU_REQUIRE_REDIS_ADAPTER: ${SFU_REQUIRE_REDIS_ADAPTER:-}
      BROWSER_SERVICE_URL: ${BROWSER_SERVICE_URL:-http://localhost:3040}
      BROWSER_SERVICE_TOKEN: ${BROWSER_SERVICE_TOKEN:-}
      BROWSER_SERVICE_TIMEOUT_MS: ${BROWSER_SERVICE_TIMEOUT_MS:-5000}
      RECORDER_PROFILE: ${RECORDER_PROFILE:-auto}
      RECORDER_CHROMIUM_PATH: ${RECORDER_CHROMIUM_PATH:-/usr/bin/chromium}
      RECORDER_PUBLIC_URL: ${RECORDER_PUBLIC_URL:-http://127.0.0.1:3000}
      RECORDER_MAX_CONCURRENT_SESSIONS: ${RECORDER_MAX_CONCURRENT_SESSIONS:-}
      RECORDER_DEFAULT_WIDTH: ${RECORDER_DEFAULT_WIDTH:-}
      RECORDER_DEFAULT_HEIGHT: ${RECORDER_DEFAULT_HEIGHT:-}
      RECORDER_DEFAULT_FPS: ${RECORDER_DEFAULT_FPS:-}
      RECORDER_DEFAULT_VIDEO_BITRATE_KBPS: ${RECORDER_DEFAULT_VIDEO_BITRATE_KBPS:-}
      RECORDER_DEFAULT_AUDIO_BITRATE_KBPS: ${RECORDER_DEFAULT_AUDIO_BITRATE_KBPS:-}
      RECORDING_STORAGE_PATH: ${RECORDING_STORAGE_PATH:-/var/lib/conclave/recordings}
      CONCLAVE_SQLITE_PATH: ${CONCLAVE_SQLITE_PATH:-/var/lib/conclave/recordings/conclave.sqlite}
    volumes:
      - ${RECORDING_STORAGE_PATH:-/var/lib/conclave/recordings}:/var/lib/conclave/recordings
    restart: unless-stopped

  sfu-b:
    build:
      context: .
      dockerfile: packages/sfu/Dockerfile
    network_mode: "host"
    environment:
      SFU_PORT: "3032"
      SFU_INSTANCE_ID: "sfu-b"
      SFU_SECRET: ${SFU_SECRET}
      TRANSCRIPT_WORKER_URL: ${TRANSCRIPT_WORKER_URL:-http://localhost:8788}
      SFU_DRAINING: "false"
      RTC_MIN_PORT: "41001"
      RTC_MAX_PORT: "42000"
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      PLAIN_TRANSPORT_ANNOUNCED_IP: ${PLAIN_TRANSPORT_ANNOUNCED_IP:-${ANNOUNCED_IP}}
      SFU_VERSION: "v2"
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_WORKERS_AI_MODEL: ${CLOUDFLARE_WORKERS_AI_MODEL:-}
      SFU_GAME_AI_ENABLED: ${SFU_GAME_AI_ENABLED:-}
      SFU_GAME_AI_TIMEOUT_MS: ${SFU_GAME_AI_TIMEOUT_MS:-}
      SFU_GAME_AI_WEB_SEARCH_ENABLED: ${SFU_GAME_AI_WEB_SEARCH_ENABLED:-}
      SFU_GAME_AI_WEB_SEARCH_CONTEXT_SIZE: ${SFU_GAME_AI_WEB_SEARCH_CONTEXT_SIZE:-}
      REDIS_URL: ${REDIS_URL:-}
      SFU_REDIS_URL: ${SFU_REDIS_URL:-${REDIS_URL:-}}
      SFU_REQUIRE_REDIS_ADAPTER: ${SFU_REQUIRE_REDIS_ADAPTER:-}
      BROWSER_SERVICE_URL: ${BROWSER_SERVICE_URL:-http://localhost:3040}
      BROWSER_SERVICE_TOKEN: ${BROWSER_SERVICE_TOKEN:-}
      BROWSER_SERVICE_TIMEOUT_MS: ${BROWSER_SERVICE_TIMEOUT_MS:-5000}
      RECORDER_PROFILE: ${RECORDER_PROFILE:-auto}
      RECORDER_CHROMIUM_PATH: ${RECORDER_CHROMIUM_PATH:-/usr/bin/chromium}
      RECORDER_PUBLIC_URL: ${RECORDER_PUBLIC_URL:-http://127.0.0.1:3000}
      RECORDER_MAX_CONCURRENT_SESSIONS: ${RECORDER_MAX_CONCURRENT_SESSIONS:-}
      RECORDER_DEFAULT_WIDTH: ${RECORDER_DEFAULT_WIDTH:-}
      RECORDER_DEFAULT_HEIGHT: ${RECORDER_DEFAULT_HEIGHT:-}
      RECORDER_DEFAULT_FPS: ${RECORDER_DEFAULT_FPS:-}
      RECORDER_DEFAULT_VIDEO_BITRATE_KBPS: ${RECORDER_DEFAULT_VIDEO_BITRATE_KBPS:-}
      RECORDER_DEFAULT_AUDIO_BITRATE_KBPS: ${RECORDER_DEFAULT_AUDIO_BITRATE_KBPS:-}
      RECORDING_STORAGE_PATH: ${RECORDING_STORAGE_PATH:-/var/lib/conclave/recordings}
      CONCLAVE_SQLITE_PATH: ${CONCLAVE_SQLITE_PATH:-/var/lib/conclave/recordings/conclave.sqlite}
    volumes:
      - ${RECORDING_STORAGE_PATH:-/var/lib/conclave/recordings}:/var/lib/conclave/recordings
    restart: unless-stopped
