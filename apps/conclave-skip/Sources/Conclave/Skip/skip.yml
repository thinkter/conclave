# Configuration file for https://skip.tools project
#
# Kotlin dependencies and Gradle build options for this module can be configured here
build:
  contents:
    - block: 'dependencies'
      contents:
        - 'implementation("io.socket:socket.io-client:2.1.1")'
        - 'implementation("com.mediasfu:mediasoup-client:1.0.1")'
        - 'implementation("com.google.android.gms:play-services-auth:21.2.0")'
        - 'implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")'
        - 'implementation("androidx.compose.material:material-icons-extended")'
        # dotLottie powers the branded meeting-entry takeover animation.
        - 'implementation("com.github.LottieFiles:dotlottie-android:0.13.7")'
        # Native Android bottom sheet presentation for meeting controls.
        - 'implementation("com.github.skydoves:flexible-bottomsheet-material3-android:0.2.0")'
        # CameraX powers the native pre-join camera preview.
        - 'implementation("androidx.camera:camera-core:1.4.2")'
        - 'implementation("androidx.camera:camera-camera2:1.4.2")'
        - 'implementation("androidx.camera:camera-lifecycle:1.4.2")'
        - 'implementation("androidx.camera:camera-view:1.4.2")'

# this is a transpiled Skip Lite module
skip:
  mode: 'transpiled'
